name: Suggest a Resource
description: Suggest a paper, article, tool, or talk for the reading list or agentic stack.
title: "[Resource]: "
labels: ["suggestion"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - The Agentic Stack (tool/framework)
        - Reading List (paper/article/talk)
        - Agent Prompts (new role/template)
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Resource Name
      placeholder: "e.g., CrewAI"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://..."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Why it belongs here
      placeholder: "One sentence on why this is relevant."
    validations:
      required: true
